<!--
git fetch

Command usado para atualizar novas branches;

Imagine que um dev do seu time criou uma nova branch e voce quer visualizá-la...
Pra isso é só usar o comman git fetch;





Imagina que voce é recem chegano na empresa e foi convidado a participar de um projeto;


1- Crie um repositorio remoto no GitHub  "dia_dia_trabalho" ;
2- Crie um repositorio local na area de trabalho; Imagine que esse repositorio local está na máquina do dev Senior da sua equipe. Ele que criou o projeto;

(DEV SENIOR AQUI)
Antes, eu preciso criar uma diretorio e um arquivo dentro;
        mkdir -p dia_dia_trabalho;
        touch dia_dia_trabalho/arquivo1.txt;


        git init;
        git add arquivo1.txt;
        git commit -a -m "Adicionado os arquivos do projeto";

        git remote add origin caminhoTal...
        git push -u origin master/main;


        Pronto. Temos nosso repositorio remoto. Imagine que esse repositorio está na máquina do dev Senior;




(AGORA SOU EU)

Foi pedido para voce adicionar uma linha no arquivo "arquivo1.txt" do projeto. Essa é sua tarefa;


1- Crie essa estrutura de diretorio na area de trabalho e clone o repositorio do projeto:
	projeto/
		seniorDev/
		gabrielDev/
		
		
	mkdir gabrielDev;
	git clone https://github.com/lGabrielDev/dia_dia_trabalho.git;
	
	
	mkdir seniorDev;
	git https://github.com/lGabrielDev/dia_dia_trabalho.git;
	
O diretorio "seniorDev" representa chefe do seu time;
O diretorio "gabrielDev" representa voce;
	
Show!


Beleza. Vamos realizar a tarefa pedida. Vamos adicionar uma linha ao arquivo;

2- Na sua pasta "gabrielDev" crie uma branch para trabalhar;
	git branch adicionarUmaLinha;
	git branch;  -> lista as branches;
	

3- Troque para branch criada;
	git checkout branchTal;
	git branch;
	
Agora sim. Criamos nossa branch para trabalhar nossa funcionalidade.
	
	
4- Faça a alteração que foi pedida no arquivo;

5- Commit essa alteracao;
	git commit -a -m "adicionado uma linha";

5- Dê um push para enviar ao repositorio remoto;
	git push;
	
	Perceba que deu um erro...
	Execute o command que aparece no erro:
	git push --set-upstream origin adicionarUmaLinha
	
	
	
	
Beleza. Nossa parte foi feita.
Aí voce "gabriel" vai falar pro seu chefe:
	"Olha chefe, já fiz a funcionalidade que o senhor pediu. Dá uma olhada lá."


Agora o devSenior vai entrar;

(DEV SENIOR)
Imagine que o dev senior quer acessar a branch que voce criou...

6- Acesse o diretorio do devSenior e troque para a branch criada pelo lGabrielDev;

	git branch;
	Perceba que não aparece a branch criada pelo Gabriel.
	
	Basta eu atualiar as branches do projeto com o command "git fetch";
		git fetch -a;  -> all
	
	Agora sim, eu consigo acessar as branches criadas por outros devs;
	git checkout branchTal;
	git branch;
	
	Agora aparece.
	
	Assim que seu chefe trocar para a branch que o "gabriel" criou, vai atualizar o arquivo.
	Se não, basta seu chefe dar um "git pull" e dale;
	
	

	Assim, ele pega a versao mais recente do repositorio remoto;


Resumindo:
git fetch -> atualiza e busca por novas branches criadas por outros devs;
 -->
