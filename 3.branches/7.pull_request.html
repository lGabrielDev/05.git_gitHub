Pull request

É a aba no GitHub responsável por enviar os códigos para a branch master;

Se todos os devs do time conseguissem dar um "git merge" e atualizar a branch master ficaria uma bagunca... Todo mundo dando git push na master;

Geralmente a branch master é atualizada de tempos em tepos. A cada uma semana ou 15 dias por exemplo;

Para ser mais organizado, o fluxo melhor seria assim:

1- O dev Senior/Chefe criou uma issue que precisa ser resolvida;
2- Voce pega a issue para resolver;
3- Cria uma branch para realizar a tarefa;
4- Depois de realizado, commito e dou push da minha branch.

Beleza, branch upada no repositorio remoto GitHub, vamos dar um pull request;

5- Se estiver tudo ok, aí sím o líder do time acessa a branch master e dá um "git merge" na sua branch;






No dia a dia de trabalho vai funcionar assim:

Digamos que exista uma issue para resolver...

A issue/tarefa é criar um arquivo ".css" no projeto;

(GABRIEL DEV)

1- Clone o repositorio linux para o Desktop;

2- Crio a branch para realizar a tarefa;
        git branch criar_arquivo_css;
        git checkout criar_arquivo_css;
        git branch;

2- Vou realizar a tarefa solicitada
        touch arquivo.css;

Funcionalidade desenvolvida. Vamos salvar o que foi feito e empurrar a branch para o repositorio remoto;
        git add ./;
        git commit -a -m "Arquivo com extensao '.css' criado";
        git push;



Agora, vamos dar um pull request para o chefe aprovar;

3- Vá no GitHub e dê um pull request;
        new pull request;
        A base é a branch main/master e a branch que vou dar merge branchTal;


(Chefe)
Agora o chefe vai analisar o pull request que voce fez.

Tudo certo.

4- Acesse a branch main/master e dê um merge na branch da funcionalidade;
        git checkout main;
        git merge branchTal;

Pronto.

5- Verifique no GitHub na branch master/main se foi adicionado o arquivo ".css";

Easy!

------------------------------------------------------------------------------------------------------------------------------------------

Resumindo:
O pull request nada mais é do que uma solicitacao para fazer um merge;
Como não sou lider do projeto, nao tenho autorizacao para dar o command merge. Por isso, eu faço uma solicitacao(pull request) para que seja feito um merge;



-->
