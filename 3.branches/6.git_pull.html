<!--
git pull

Serve para recebermos atualizacoes do repositorio remoto;
Puxamos essas atualizacoes do repositorio remoto para o nosso repositorio local;

Cada branch pode ser atualizada.

Como boa prática, antes de criar um branch para trabalhar , atualizamos a branch master/main;



Praticando:

1- Crie um projeto no repositorio remoto GitHub;
    mkdir projeto_empresa;
    touch projeto_empresa/arquivo1.txt;

    git init;
    git status;
    git add ./;
    git commit -a -m "Arquivos do projeto adicionados";


    git remote add origin https://github.com/lGabrielDev/projeto_empresa.git;
    git push -u origin master;
    
Beleza. Esse vai ser o repositorio do projeto;



2- Crie essa estrutura ed diretorios no Desktop;
	devs/
		gabriel/
		pedro/

Cada diretorio representa uma pessoa, sacou??

		
3- Clone o repositorio do projeto para os dois usuarios;
	git clone https://github.com/lGabrielDev/projeto_empresa.git

Beleza, os dois devs clonaram o repositorio;

Imagina que voce e o "pedro" estao fazendo tarefas diferentes.

Primeiro, o pedro foi solicitado para fazer uma tarefa:
	Foi pedido ao "pedro" adicionar uma linha no arquivo "arquivo1.txt";

Depois, foi pedido a voce fazer outra tarefa:
	Adicionar 2 linhas no final do arquivo;
	
Vamos la...





(PEDRO)

4- Atualize a branch master para receber a ultima atualizacao do repositorio remoto;
	git pull;
	
5- Crie uma branch e faça a tarefa que foi pedida;
	git branch tarefa_pedro;
	git branch;
	git checkout tarefa_pedro;
	git branch;
	
	
6- Faça a tarefa pedido ao "Pedro". Adicione 1 linha no arquivo;

7- Salve a alteração feita na branch criada;
	git add ./;
	git commit -a -m "Linha adicionada no arquivo";
	git push --set-upstream origin tarefa_pedro;





Show de bola;

Pedro ja fez sua tarefa e upou no repositorio remoto e na branch que ele criou;

Agora, o Chefe do time vai dar um merge para atualizar a branch master do projeto;


(CHEFE)

8- Atualize a branches do projeto.
	git fetch -a;


8.1- Acesse a branch master e dê um "merge" para mesclar a branch master com a branch criada pelo pedro;
Assim, a branch master está atualizada com a funcionalidade que o "Pedro" criou;
	git branch;
	git checkout master;
	git merge origin/tarefa_pedro;
	git push -u origin master; ou git push;

Beleza. Funcionalidade do pedro foi mesclada na branch master;


Agora voce "gabriel" vai fazer sua tarefa;
A sua tarefa é adicionar 2 linhas no final do arquivo;





(GABRIEL)

	git pull;

	
 Pronto. A branch master está atualizada. Assim, podemos trabalhar em nossa tarefa, sabendo que a branch master está na ultima versao;
