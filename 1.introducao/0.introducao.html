Controle de versão:
É importante registrar as versoes do seu programa.
Assim, temos o controle de todas as modificacoes feitas no código.

Se quisermos acessar a versao 1, ele vai estar salvo.
Se quisermos acessar a versao tal, ele vai estar salvo.


Sempre que voce faz uma alteracao, voce registra essa alteracao, criando uma nova versao.


Imagina que vc fez uma atualizacao no código e deu algum problema.
Como vc registrou todas as versoes do programa, basta vc verificar a versao anterior e comparar.

Ex:
Criei um programinha onde o usuario vai digitar 2 numeros e depois somá-los; -> Versão 1;

Tratei os erros, caso o usuario digite uma String -> Versão 2;

Escrevi uma mensagem de despedida, no final do programa -> Versão 3;

Sacou?? Eu estou controlando as alteracoes do meu programa.
Isso é muito importante!

Aí que entra as ferramentas de controle de versão -> GIT 
-----------------------------------------------------------------------------------------------------------------

Git
É o sistema de controle de versao mais conhecido no mundo.


-----------------------------------------------------------------------------------------------------------------
GitHub
Serviço para gerenciar nossos repositórios;

Podemos enviar nossos projetos para o GitHub e disponibilizar para outros devs;
-----------------------------------------------------------------------------------------------------------------
Repositorios nada mais sao do que diretorios:

Windows -> pastas
Linux   -> diretorios
Git     -> repositorios
