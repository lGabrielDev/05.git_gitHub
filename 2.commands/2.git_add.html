git init -> transforma o diretorio atual em um repositorio local;


------------------------------------------------------------------------------------------------------------------------------------------
git status;

Mostra todas as informacoes do projeto;

    .arquivos/diretorios que ainda nao foram add e estão untracked;
    .arquivos/diretorios que ainda não foram commitados;
    
    etc...


------------------------------------------------------------------------------------------------------------------------------------------
git add

Adiciona arquivos para a área de staging(área de espera);

Aqui, colocamos um arquivo no nosso repositório;
Se voce não der o command "git add" , o arquivo vai ficar como untracked e não vamos conseguir manipular esse arquivo com o git;


É como se o arquivo não existisse aos olhos do git. O git não considera ele parte do projeto;

-Crie um arquivo ".txt" no repositorio que criamos;
    touch arquivo1.txt;


-Agora que criamos um arquivo, dê um "git status" e veja:
    git status;

Viu?? Mostrou os arquivos que estao untracked;
Ou seja... Arquivos que estão no seu repositorio atual, mas que ainda não foram adicionados; 

-Use o command "git add" e adicione o arquivo ".txt" para a area de staging;

Pronto. O arquivo está na área de stanging;

a que com cada alteracao o arquivo muda de cor e aparece uma letrazinha;
Perceb


-Apague o diretorio do repositorio, juntamentente com o arquivo ".git";
Vamos fazer tudo denovo;


1-Crie um diretorio que será nosso repositório;
    mkdir repository_1;

2-Crie os arquivos do projeto. Esses serão os arquivos do nosso projeto/repository;
    Segue essa lista de arquivos/diretorios para criar:

        .3 arquivos ".txt";
        .2 arquivos ".pdf";
        .1 estrutura de diretorio
            .pasta1/
                arquivoTeste.pdf;


Beleza. Temos os arquivos do projeto;

3-Transforme o diretório criado em um repositório.
    git init;


4- Dê um git status para ver se está tudo ok;
    git status;

Aqui, todos os arquivos estão como "untracked". Ou seja, não foram adicionados;
Aos olhos do git, esses arquivos untracked não fazem parte do projeto/repositorio;
Voce precisa adicioná-los.

5- Adicione para a area de stagium todos os arquivos com extensao ".txt";
        git add *.txt; ou

        git add arquivo1.txt arquivo2.txt arquivo3.txt;


6-Dê um git status:
    Viu?? Os arquivos aparecem diferentes:
        A -> Added
        U -> Untracked
        M -> Modified



7- Adicione o diretorio "pasta1" para a area de stagium;
        git add pasta1/;

    Dê um git status;

Padraozin. Como se eu tivesse adicionando um arquivo;


8-  Dê um git reset para resetar as alteracoes feitas;
        git reset;
        git status;

Beleza. Todos os arquivos estão como "untracked";


9- Adicione todos os arquivos de uma vez;
    git add ./;


    Show de bola. Agora, os arquivos estão trackeados e esperando para serem commitados;
