git init -> Transforma um diretório em um repositório vazio;

git add  -> Adicione arquivos/diretorios para o repositório. Ele "trackeia" os arquivos; Assim o git consegue trackear(rastrear/identificar) esses arquivos;

git commit -> Salva as alteracoes feitas no arquivo;

git push -> Envia os arquivos commitados do repositorio local para o repositorio remoto;
------------------------------------------------------------------------------------------------------------------------------------------
git remote

Estabelece uma conexao com o repositorio local e o repositorio remoto do GitHub;


1- Crie um repositorio lá no GitHub;

3- Conecte o repositório local com o repositorio remoto GitHub;
    git remote add origin https:......;

    "Estou usando um command git, estou estabelecendo uma conexao entre nosso repositorio local e o repositorio remoto do GitHub, add para adicionar, origin é o apelido que estou dando para o repositorio do git; "


    Por boas práticas, o apelido do repositorio é "origin";

    Resumindo:

    "Git, faça a conexao do nosso repositorio local com o repositorio do github. O apelido desse repositorio é 'origin'."


    Use sempre o "HTTPS"; o outro dá pau;


4- Acesse o galho(branch) main/master;
    git branch -M main/master



git push

Envia os commits(alteracoes salvas) do repositorio local do seu pc para o repositório do github;

O "git push" só consegue enviar arquivos commitados;

-Dê um git status e verifique se está tudo commitado;



5- Empurre os arquivos do repositorio local do seu PC para o repositorio do github;
    git push -u origin main;

 "Git, empurre todos os commits do repositorio local para o repositorio tal na branch(galho) tal "

 Esse parametro -u só precisa colocar no primeiro push. Depois, não precisa utilizar.
