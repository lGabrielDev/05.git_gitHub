<!--
    git reset --hard


Imagina que voce commitou algo errado, e não quer usar o push para enviar para o repositorio remoto;

Basta usar o "git reset --hard";
Assim, o git desconsidera esse commit e passa a considerar o ultimo commit feito.

1- Acesse algum arquivo e altere alguma coisa;
2- commit esssa alteracao;
3- Dê um "git status"
        Viu? Está informando que têm 1 commit;

    Dê um "git log"
        Viu? O ultimo commit feito aparece ali.



4- Voce commitou errado. Resete o commit feito;
        git reset --hard origin/main;


5- Dê um "git log" novamente:
        Viu?? O commit feito desapareceu.


Easy!

Fez besteira? Commitou errado? Dê um git reset --hard;


Cuidado!! Use com cautela.
Certifique de que voce deu um push para o repositorio remoto do GitHub.
Se voce resetar a branch, tudo que foi commitado será perdido. Cuidado!!

-->
