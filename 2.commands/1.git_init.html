Repositórioss 

É onde o código é armazenado.
Cada projeto é armazenado em um repositório diferente.


Ao inves de armazenar o projeto na máquina de algum dev do time, é mais inteligente armazenar em um repositorio remoto.
-----------------------------------------------------------------------------------------------------------------

git init

Transforma um diretório em um repositório vazio;

Assim que voce dá o command, é criado uma pasta oculta ".git" no diretório atual com os arquivos necessários para criar nosso repositorio;
Não mexa nesse diretorio oculto ".git". Deixe ele bonitinho ali.


Após esse command, o diretório atual será reconhecido pelo git como um repositorio local. Assim, o diretorio atual consegue responder aos commands git;



FAÇA TODOS OS EXERCÍCIOS EM UM diretorio lá no desktop; Para dar um git add errado; Para nao cagar tudo!!!

Crie um repositorio lá no desktop. Bem melhor!




1- Crie um diretório (Aqui mesmo, dentro do diretorio "repositorios"), e vamos usar ele como nosso projeto;
    mkdir aprendendo_git;

2- Dê um git status e veja se existe algum repositório ali;
    git status;

3- Não tem. O git ainda não o reconhece como repositorio. Vamos inicializar nosso repositório;
    git init;

4- Agora sim, criamos nosso repositório. Dê um ls -lha e veja o diretorio oculto criado ".git";
    ls -lha;

5- Dê um git status novamente...
    git status;

Agora sim, criamos nosso repositório;

-----------------------------------------------------------------------------------------------------------------
