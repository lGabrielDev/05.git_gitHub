<!--
git checkout

Imagina que voce estava modificando um arquivo e seu chefe falou que nao precisa mais fazer alteracao e commitar, e é pra deixar o código do jeito que estava;

Imagina que apagou o que voce estava alterando e deixou do jeito que estava. Provavelmente voce vai esquecer algum espaço em branco e o git vai considerar aquilo como alteracao;


1- Crie um arquivo no repositorio remoto (um arquivo '.txt' em branco);

    git add;
    git commit;
    git push;


2- Vá no arquivo e escreva alguma coisa.
    Beleza. Voce fez uma alteracao. Dê um git status:
        git status;

Seu chefe falou pra voce não commitar e enviar, igual explicamos acima.

3- Apague o que voce escreveu , deixe um espaco, e dê um "git status" novamente:
        Viu? A modificacao continua lá.

4- Use o git checkout :
        git checkout arquivoTal;

        git status;

Viu??

O arquivo voltou para a versao atual do repositorio remoto GitHub;


Se fosse em um codigo gigante, seria dificil encontrar o espaco em branco. Dá um "git checkout" e volta pro arquivo original;





-->
